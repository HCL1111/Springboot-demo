displayName: "Cloud Run Service Down Alert"
documentation:
  content: "The Cloud Run service confluence-rag-chatbot is not receiving traffic or has stopped responding"
  mimeType: "text/markdown"
conditions:
  - displayName: "Cloud Run Service Error Rate"
    conditionThreshold:
      filter: 'resource.type="cloud_run_revision" AND resource.labels.service_name="confluence-rag-chatbot" AND metric.type="run.googleapis.com/request_count"'
      comparison: COMPARISON_GT
      thresholdValue: 0
      duration: 60s
      aggregations:
        - alignmentPeriod: 60s
          perSeriesAligner: ALIGN_RATE
          crossSeriesReducer: REDUCE_SUM
notificationChannels: []
alertStrategy:
  autoClose: 604800s
combiner: OR
enabled: true
